<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Real-Time Property Docent</title>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_KEY&libraries=geometry"></script>

<style>

body{
margin:0;
font-family:-apple-system,sans-serif;
background:#f2f2f7;
}

#map{
height:100vh;
width:100%;
}

#panel{
position:absolute;
bottom:0;
width:100%;
height:160px;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

#guideTitle{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

#guideText{
font-size:14px;
color:#555;
}

#myLocation{
position:absolute;
right:20px;
bottom:200px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
font-size:26px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="panel">
<div id="guideTitle">부동산 도슨트</div>
<div id="guideText">데이터 로딩중...</div>
</div>

<button id="myLocation">📍</button>

<script>

const GOOGLE_KEY="YOUR_GOOGLE_MAP_KEY"
const ELEVEN_KEY="YOUR_ELEVEN_API_KEY"
const VOICE_ID="YOUR_VOICE_ID"

let map
let userMarker
let audioPlayer=new Audio()

let points=[]
let announced=new Set()

async function init(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:37.288,lng:127.114},
zoom:15,
disableDefaultUI:true
})

userMarker=new google.maps.Marker({
map:map,
icon:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
})

await loadAllData()

startGPS()

}

async function loadAllData(){

document.getElementById("guideText").innerText="데이터 변환중..."

await loadCSV("data/아파트(매매)_실거래가_20260314195705.csv","아파트")
await loadCSV("data/오피스텔(매매)_실거래가_20260314195741.csv","오피스텔")
await loadCSV("data/토지(매매)_실거래가_20260314195804.csv","토지")

await loadTrail("data/산책로현황.txt")
await loadPark("data/자연공원현황.txt")

document.getElementById("guideText").innerText="GPS 위치 확인중..."

}

async function loadCSV(path,type){

const res=await fetch(path)
const text=await res.text()

const rows=text.split("\n")

for(const row of rows.slice(1,10)){

const col=row.split(",")

const address=col[0]

const pos=await geocode(address)

if(pos){

points.push({
id:type+address,
lat:pos.lat,
lng:pos.lng,
text:`${address} 지역 ${type} 거래가 발생했습니다`
})

}

}

}

async function loadTrail(path){

const res=await fetch(path)
const text=await res.text()

const rows=text.split("\n")

for(const row of rows.slice(1,6)){

const col=row.split("\t")

const name=col[1]
const address=col[2]

const pos=await geocode(address)

if(pos){

points.push({
id:name,
lat:pos.lat,
lng:pos.lng,
text:`${name} 산책로 구간입니다`
})

}

}

}

async function loadPark(path){

const res=await fetch(path)
const text=await res.text()

const rows=text.split("\n")

for(const row of rows.slice(1,6)){

const col=row.split("\t")

const name=col[1]
const address=col[3]

const pos=await geocode(address)

if(pos){

points.push({
id:name,
lat:pos.lat,
lng:pos.lng,
text:`${name} 공원입니다`
})

}

}

}

async function geocode(address){

try{

const url=`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${GOOGLE_KEY}`

const res=await fetch(url)
const data=await res.json()

if(data.status==="OK"){

return{
lat:data.results[0].geometry.location.lat,
lng:data.results[0].geometry.location.lng
}

}

}catch(e){}

return null

}

function startGPS(){

navigator.geolocation.watchPosition(pos=>{

const p={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

userMarker.setPosition(p)

map.panTo(p)

checkDistance(p)

})

}

function checkDistance(p){

points.forEach(point=>{

const dist=google.maps.geometry.spherical.computeDistanceBetween(
new google.maps.LatLng(p.lat,p.lng),
new google.maps.LatLng(point.lat,point.lng)
)

if(dist<120&&!announced.has(point.id)){

announced.add(point.id)

document.getElementById("guideTitle").innerText="도슨트 안내"
document.getElementById("guideText").innerText=point.text

speak(point.text)

}

})

}

async function speak(text){

try{

const res=await fetch(
`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,
{
method:"POST",
headers:{
"xi-api-key":ELEVEN_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text,
model_id:"eleven_multilingual_v2"
})
}
)

const blob=await res.blob()

const url=URL.createObjectURL(blob)

audioPlayer.src=url

audioPlayer.play()

}catch(e){}

}

document.getElementById("myLocation").onclick=()=>{

map.panTo(userMarker.getPosition())

}

init()

</script>

</body>
</html>
