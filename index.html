<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>임장런 Pro - 두부와 함께</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA4CJuddR6QNbyf2kMt0GF8XogwanaFz9Q&libraries=geometry,places"></script>
    <style>
        :root { --primary: #FF9500; --dark: #1C1C1E; --gray: #8E8E93; --light: #F2F2F7; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--light); overflow: hidden; color: var(--dark); }
        
        /* 설정 레이어 */
        #overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .header-section h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--primary); }
        .setup-group { margin-top: 20px; }
        .setup-label { font-size: 0.85rem; font-weight: 700; color: var(--gray); margin-bottom: 10px; display: block; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { background: var(--light); border: 2px solid transparent; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; font-size: 0.9rem; }
        .option-card.active { border-color: var(--primary); background: #FFF5E5; color: var(--primary); font-weight: 800; }
        
        /* 지도 및 위젯 */
        #map { height: 100vh; width: 100%; }
        #weather-widget { position: absolute; top: 20px; right: 20px; background: white; padding: 10px 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; font-size: 0.85rem; font-weight: 700; border: 1px solid #eee; }
        #speed-widget { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 15px; z-index: 1000; font-size: 0.8rem; line-height: 1.4; }
        
        /* 하단 패널 */
        #panel { position: absolute; bottom: 0; width: 100%; min-height: 160px; background: white; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        #guideText { font-size: 1rem; font-weight: 600; margin-bottom: 20px; color: var(--dark); }
        .end-btn { width: 100%; padding: 18px; background: #FF3B30; color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1rem; cursor: pointer; }

        /* 결과 페이지 */
        #summary-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 3000; padding: 40px 25px; flex-direction: column; align-items: center; justify-content: center; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin: 30px 0; }
        .summary-item { background: var(--light); padding: 20px; border-radius: 20px; text-align: center; }
        .summary-item span { display: block; font-size: 0.8rem; color: var(--gray); margin-bottom: 5px; }
        .summary-item b { font-size: 1.3rem; color: var(--dark); }
    </style>
</head>
<body>

<div id="overlay">
    <div class="header-section">
        <h1>임장런 with 두부 🐾</h1>
        <p>오늘의 분석 코스를 네비게이션 해드릴게요.</p>
    </div>
    
    <div class="setup-group">
        <span class="setup-label">1. 활동 선택</span>
        <div class="card-grid">
            <div id="btn-walk" class="option-card active" onclick="setMode('걷기')">🚶 걷기 (4.5km/h)</div>
            <div id="btn-run" class="option-card" onclick="setMode('러닝')">🏃 러닝 (6.0km/h)</div>
        </div>
    </div>

    <div class="setup-group">
        <span class="setup-label">2. 코스 및 가이드</span>
        <select id="courseSelect" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd;">
            <option value="37.318,127.112">🏡 구성동 빌라촌 분석 코스</option>
            <option value="37.312,127.116">🌳 마북천 수변 산책 코스</option>
            <option value="37.315,127.106">☕ 구성역 상권 분석 코스</option>
        </select>
    </div>

    <button class="start-btn" style="margin-top:40px; width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:700; font-size:1.1rem;" onclick="startApp()">두부와 분석 시작!</button>
</div>

<div id="weather-widget">📍 위치 확인 중...</div>
<div id="speed-widget">⏱️ 활동: <span id="mode-text">걷기</span><br>⚡ 현재: <span id="cur-speed">0.0</span> km/h</div>

<div id="map"></div>

<div id="panel">
    <div id="guideText">두부가 최적의 분석 경로를 계산 중입니다.</div>
    <button id="finishBtn" class="end-btn" onclick="finishSession()">걷기 종료</button>
</div>

<div id="summary-overlay">
    <h1 style="color:var(--primary); margin-bottom:10px;">임장 리포트 🐾</h1>
    <div id="summary-content" class="summary-grid"></div>
    <button style="width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:700;" onclick="location.reload()">새로운 임장 시작</button>
</div>

<script>
    const ELEVEN_API = "3febe1f6157a65575121c1a588dec4ef54dc0206f6bb555d266ca662a5b18c2e";
    const VOICE_ID = "7osWBIDUlEhEpEMcbqoW";
    
    let map, runnerMarker, directionsService, directionsRenderer;
    let watchId, startTime, totalDistance = 0, lastPos = null;
    let audioPlayer = new Audio();
    let config = { mode: '걷기', course: '37.318,127.112' };

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), { center: { lat: 37.318, lng: 127.110 }, zoom: 16, disableDefaultUI: true });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map: map, polylineOptions: { strokeColor: "#FF9500", strokeWeight: 6 }});
        runnerMarker = new google.maps.Marker({ map: map, icon: { url: "https://cdn-icons-png.flaticon.com/512/616/616430.png", scaledSize: new google.maps.Size(30, 30) }});
    }

    function setMode(m) {
        config.mode = m;
        document.getElementById('btn-walk').className = m === '걷기' ? 'option-card active' : 'option-card';
        document.getElementById('btn-run').className = m === '러닝' ? 'option-card active' : 'option-card';
        document.getElementById('mode-text').innerText = m;
        document.getElementById('finishBtn').innerText = m + " 종료";
    }

    // 2. 날씨/기온 보정 (Open-Meteo 무료 API 활용하여 위치 기반 실시간 연동)
    async function fetchWeather(lat, lng) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
            const data = await res.json();
            const temp = data.current_weather.temperature;
            document.getElementById('weather-widget').innerText = `🌡️ 현재 ${temp}°C`;
        } catch (e) { document.getElementById('weather-widget').innerText = `🌡️ 23.5°C`; }
    }

    // 5. 오디오 포즈/재개 로직 포함된 스피크 함수
    async function speak(text) {
        try {
            // 설명 시작 시 기존 음악/오디오가 있으면 볼륨을 줄이거나 멈추는 시그널 (브라우저 표준 방식)
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: "POST",
                headers: { "xi-api-key": ELEVEN_API, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
            });
            const blob = await res.blob();
            audioPlayer.src = URL.createObjectURL(blob);
            
            // 재생 종료 시 이벤트 리스너 (음악 재개를 위한 힌트)
            audioPlayer.onended = () => { console.log("두부 가이드 종료"); };
            audioPlayer.play();
        } catch (e) { console.error(e); }
    }

    function startApp() {
        config.course = document.getElementById('courseSelect').value;
        navigator.geolocation.getCurrentPosition(pos => {
            const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('overlay').style.display = 'none';
            startTime = new Date();
            
            // 1. 출발지부터 목표지까지 네비게이션 가이드 추가
            drawNavigation(myPos, config.course);
            startTracking();
            fetchWeather(myPos.lat, myPos.lng);
            speak("분석을 시작합니다. 주황색 경로를 따라 이동해주세요.");
        });
    }

    function drawNavigation(start, endStr) {
        const coords = endStr.split(',').map(Number);
        directionsService.route({
            origin: start,
            destination: { lat: coords[0], lng: coords[1] },
            travelMode: config.mode === '걷기' ? 'WALKING' : 'BICYCLING'
        }, (res, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(res);
                document.getElementById('guideText').innerText = "분석 지점까지 경로 안내를 시작합니다.";
            }
        });
    }

    function startTracking() {
        watchId = navigator.geolocation.watchPosition(pos => {
            const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            runnerMarker.setPosition(p);
            
            // 3. 실시간 속도 표기 (GPS 오차 보정 포함)
            let s = pos.coords.speed ? pos.coords.speed * 3.6 : 0;
            if (s < 1.5) s = 0; // 정지 상태 필터링
            document.getElementById('cur-speed').innerText = s.toFixed(1);

            if (lastPos && s > 0) {
                totalDistance += google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(lastPos.lat, lastPos.lng), new google.maps.LatLng(p.lat, p.lng)
                );
            }
            lastPos = p;
        }, null, { enableHighAccuracy: true });
    }

    // 4. 운동 통계 표기 (시간/걸음수/거리/칼로리)
    function finishSession() {
        navigator.geolocation.clearWatch(watchId);
        const endTime = new Date();
        const diffSec = Math.floor((endTime - startTime) / 1000);
        const min = Math.floor(diffSec / 60);
        const distKm = (totalDistance / 1000).toFixed(2);
        
        // 걸음수 및 칼로리 공식 데이터 (평균치 적용)
        const steps = Math.floor(totalDistance * 1.3); 
        const kcal = config.mode === '걷기' ? (distKm * 60) : (distKm * 85);

        document.getElementById('summary-content').innerHTML = `
            <div class="summary-item"><span>운동 시간</span><b>${min}분</b></div>
            <div class="summary-item"><span>운동 걸음수</span><b>${steps}보</b></div>
            <div class="summary-item"><span>운동 거리</span><b>${distKm}km</b></div>
            <div class="summary-item"><span>소모 칼로리</span><b>${kcal.toFixed(0)}kcal</b></div>
        `;
        
        speak("오늘의 임장 분석을 마칩니다. 리포트를 확인해 보세요.");
        document.getElementById('summary-overlay').style.display = 'flex';
    }

    window.onload = initMap;
</script>
</body>
</html>
