<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>임장런 Pro - Imjang Run</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBp1tTcQN6VvPFfQk2uMM6E0xrao1dgzTo&libraries=geometry,places"></script>
    <style>
        :root { --primary: #FF9500; --dark: #1C1C1E; --gray: #8E8E93; --light: #F2F2F7; }
        body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; background: var(--light); overflow: hidden; color: var(--dark); }
        
        #overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .header-section { margin-bottom: 25px; }
        .header-section h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -1px; }
        .header-section p { color: var(--gray); margin-top: 5px; font-size: 0.95rem; }

        .setup-group { margin-bottom: 20px; }
        .setup-label { font-size: 0.85rem; font-weight: 700; color: var(--gray); margin-bottom: 10px; display: block; }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { background: var(--light); border: 2px solid transparent; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .option-card.active { border-color: var(--primary); background: #FFF5E5; color: var(--primary); font-weight: 700; }

        .dist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .dist-card { background: var(--light); border-radius: 12px; padding: 12px 0; text-align: center; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .dist-card.active { background: var(--primary); color: white; }

        .select-style { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; background-color: #fff; font-size: 0.95rem; outline: none; cursor: pointer; margin-bottom: 10px; }
        .start-btn { margin-top: 30px; width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }

        #map { height: 100vh; width: 100%; }
        #weather-widget { position: absolute; top: 20px; right: 20px; background: white; padding: 10px 18px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; font-weight: 800; font-size: 0.9rem; border: 2px solid var(--primary); }
        #speed-widget { position: absolute; top: 20px; left: 20px; background: rgba(28,28,30,0.8); color: white; padding: 10px 15px; border-radius: 15px; z-index: 1000; font-weight: 700; font-size: 0.8rem; }
        
        #panel { position: absolute; bottom: 0; width: 100%; min-height: 180px; background: white; border-radius: 30px 30px 0 0; padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 100; box-sizing: border-box;}
        #guideTitle { font-size: 0.8rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        #guideText { font-size: 0.95rem; font-weight: 600; line-height: 1.5; color: var(--dark); margin-bottom: 15px; }
        
        .end-btn { width: 100%; padding: 15px; background: #FF3B30; color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }

        #summary-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 3000; padding: 40px 25px; flex-direction: column; align-items: center; justify-content: center; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin: 30px 0; }
        .summary-item { background: var(--light); padding: 20px; border-radius: 20px; text-align: center; }
        .summary-item label { display: block; font-size: 0.8rem; color: var(--gray); margin-bottom: 5px; }
        .summary-item value { font-size: 1.2rem; font-weight: 800; color: var(--dark); }

        .map-controls { position: absolute; right: 20px; bottom: 200px; display: flex; flex-direction: column; gap: 12px; z-index: 150; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="header-section">
        <h1>임장런 Imjang Run 🐾</h1>
        <p>함께 달릴 준비 되셨나요?</p>
    </div>

    <div class="setup-group">
        <span class="setup-label">1. 오늘 나의 템포</span>
        <div class="card-grid">
            <div id="btn-walk" class="option-card active" onclick="setMode('산책')">🚶 여유로운 산책</div>
            <div id="btn-run" class="option-card" onclick="setMode('러닝')">🏃 시원한 러닝</div>
        </div>
    </div>

    <div class="setup-group">
        <span class="setup-label">2. 목표 거리</span>
        <div class="dist-grid">
            <div class="dist-card active" onclick="setDist(this, 1)">1km</div>
            <div class="dist-card" onclick="setDist(this, 3)">3km</div>
            <div class="dist-card" onclick="setDist(this, 5)">5km</div>
            <div class="dist-card" onclick="setDist(this, 10)">10km</div>
        </div>
    </div>

    <div class="setup-group">
        <span class="setup-label">3. 어떤 코스로 가볼까요?</span>
        <select id="walkCourse" class="select-style" onchange="config.course = this.value">
            <option value="37.318,127.112">🏡 구성동 노후 빌라촌 & 골목 탐방</option>
            <option value="37.312,127.116">🌳 마북천 수변 공원 산책 코스</option>
            <option value="37.315,127.106">☕ 구성사거리 상가 & 카페거리 코스</option>
        </select>
        <select id="runCourse" class="select-style" style="display:none;" onchange="config.course = this.value">
            <option value="37.321,127.101">🏃 탄천 합수부 ~ 보정역 직선 러닝</option>
            <option value="37.324,127.115">⛰️ 언남동 대단지 아파트 정복 코스</option>
            <option value="37.310,127.105">🏗️ 플랫폼시티 부지 한바퀴 코스</option>
        </select>
    </div>

    <div class="setup-group">
        <span class="setup-label">4. 가이드 음성</span>
        <div class="card-grid">
            <div id="docent-on" class="option-card active" onclick="setDocent('듣기')">친절하게 듣기</div>
            <div id="docent-off" class="option-card" onclick="setDocent('조용히')">조용히 걷기</div>
        </div>
    </div>

    <button class="start-btn" onclick="startApp()">고양이와 함께 출발!</button>
</div>

<div id="summary-overlay">
    <h1 style="color:var(--primary)">임장 완료! 🐾</h1>
    <div class="summary-grid">
        <div class="summary-item"><label>운동 시간</label><value id="sum-time">0</value></div>
        <div class="summary-item"><label>이동 거리</label><value id="sum-dist">0</value></div>
        <div class="summary-item"><label>소모 칼로리</label><value id="sum-kcal">0</value></div>
        <div class="summary-item"><label>평균 속도</label><value id="sum-speed">0</value></div>
    </div>
    <button class="start-btn" onclick="location.reload()">새로운 임장 시작</button>
</div>

<div id="speed-widget">⚡ 현재 속도: <span id="current-speed">0.0</span> km/h</div>
<div id="weather-widget">🌡️ <span id="weather-info">로딩 중...</span></div>

<div id="map"></div>
<div class="map-controls">
    <button id="mapTypeBtn" class="control-btn" onclick="toggleMapType()">🛰️</button>
    <button class="control-btn" onclick="centerMap()">📍</button>
</div>
<div id="panel">
    <div id="guideTitle">NAVIGATING...</div>
    <div id="guideText">경로를 탐색하고 있습니다.</div>
    <button id="finishBtn" class="end-btn" onclick="finishSession()">종료</button>
</div>

<script>
    const ELEVEN_API = "3febe1f6157a65575121c1a588dec4ef54dc0206f6bb555d266ca662a5b18c2e";
    const VOICE_ID = "7osWBIDUlEhEpEMcbqoW";
    
    let map, runnerMarker, directionsService, directionsRenderer;
    let watchId, startTime;
    let totalDistance = 0, lastPos = null;
    let audioPlayer = new Audio();
    let config = { mode: '산책', dist: 1, docent: '듣기', course: '37.318,127.112' };

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 37.318, lng: 127.110 }, zoom: 17, disableDefaultUI: true,
            styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }]
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map, polylineOptions: { strokeColor: "#FF9500", strokeWeight: 6 }
        });
        runnerMarker = new google.maps.Marker({
            map: map, icon: { url: "https://cdn-icons-png.flaticon.com/512/616/616430.png", scaledSize: new google.maps.Size(40, 40) }
        });
    }

    function setMode(mode) {
        config.mode = mode;
        document.getElementById('btn-walk').classList.toggle('active', mode==='산책');
        document.getElementById('btn-run').classList.toggle('active', mode==='러닝');
        document.getElementById('walkCourse').style.display = mode==='산책' ? 'block' : 'none';
        document.getElementById('runCourse').style.display = mode==='러닝' ? 'block' : 'none';
        config.course = document.getElementById(mode==='산책'?'walkCourse':'runCourse').value;
    }

    function setDist(el, d) {
        document.querySelectorAll('.dist-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        config.dist = d;
    }

    function setDocent(type) {
        config.docent = type;
        document.getElementById('docent-on').classList.toggle('active', type==='듣기');
        document.getElementById('docent-off').classList.toggle('active', type==='조용히');
    }

    async function startApp() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        navigator.geolocation.getCurrentPosition(pos => {
            const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('overlay').style.display = 'none';
            startTime = new Date();
            
            updateWeather(); // 날씨 업데이트
            drawRoute(myPos, config.course);
            startTracking();
            
            if(config.docent === '듣기') speak("경로 탐색이 완료되었습니다. 고양이와 함께 이동해 볼까요?");
        }, err => alert("GPS를 켜주세요!"));
    }

    function updateWeather() {
        const temp = 20 + Math.floor(Math.random() * 6); // 20~26도 사이 가변 기온
        document.getElementById('weather-info').innerText = `구성동 🌤️ ${temp}°C`;
    }

    function drawRoute(start, endCoord) {
        const [lat, lng] = endCoord.split(',').map(Number);
        directionsService.route({
            origin: start,
            destination: { lat, lng }, // 좌표 기반으로 목적지 강제 지정
            travelMode: config.mode === '산책' ? 'WAL
