<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>임장런 Pro - Imjang Run</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=geometry,places"></script>
    <style>
        :root { --primary: #FF9500; --dark: #1C1C1E; --gray: #8E8E93; --light: #F2F2F7; --white: #FFFFFF; }
        body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; background: var(--light); overflow: hidden; color: var(--dark); }
        
        /* 설정 오버레이 */
        #overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .header-section h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -1px; }
        .setup-group { margin-bottom: 20px; }
        .setup-label { font-size: 0.85rem; font-weight: 700; color: var(--gray); margin-bottom: 10px; display: block; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { background: var(--light); border: 2px solid transparent; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .option-card.active { border-color: var(--primary); background: #FFF5E5; color: var(--primary); font-weight: 700; }
        .select-style { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; background-color: #fff; font-size: 0.95rem; margin-bottom: 10px; }
        .start-btn { margin-top: 30px; width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; }

        /* 메인 UI */
        #map { height: 100vh; width: 100%; }
        #top-bar { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 1000; }
        .status-pill { background: rgba(255,255,255,0.9); padding: 8px 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: 700; font-size: 0.85rem; border: 1px solid var(--primary); display: flex; align-items: center; gap: 5px; }

        #panel { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 30px 30px 0 0; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 100; box-sizing: border-box; }
        #guideText { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: var(--dark); margin-bottom: 15px; min-height: 40px; }
        .bottom-btns { display: flex; gap: 10px; }
        .stop-btn { flex: 1; padding: 15px; background: #FF3B30; color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }

        /* 운동 요약 창 */
        #summary-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .summary-card { background: white; width: 100%; border-radius: 25px; padding: 30px; text-align: center; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .summary-item span { display: block; color: var(--gray); font-size: 0.8rem; margin-bottom: 5px; }
        .summary-item strong { font-size: 1.2rem; color: var(--dark); }
    </style>
</head>
<body>

<div id="overlay">
    <div class="header-section">
        <h1>임장런 Imjang Run 🐾</h1>
        <p>프로 버전으로 더 스마트하게!</p>
    </div>
    <div class="setup-group">
        <span class="setup-label">1. 오늘 나의 템포</span>
        <div class="card-grid">
            <div id="btn-walk" class="option-card active" onclick="setMode('산책')">🚶 산책 (4.5km/h)</div>
            <div id="btn-run" class="option-card" onclick="setMode('러닝')">🏃 러닝 (6.0km/h)</div>
        </div>
    </div>
    <div class="setup-group">
        <span class="setup-label">2. 목표 코스 네비게이션</span>
        <select id="walkCourse" class="select-style" onchange="config.course = this.value">
            <option value="언남동 324-1">🏡 구성동 노후 빌라촌 탐방</option>
            <option value="마북천공원">🌳 마북천 수변 산책 코스</option>
        </select>
        <select id="runCourse" class="select-style" style="display:none;" onchange="config.course = this.value">
            <option value="보정역">🏃 탄천 직선 러닝</option>
            <option value="구성역">🏗️ 플랫폼시티 부지 코스</option>
        </select>
    </div>
    <button class="start-btn" onclick="startApp()">네비게이션 시작!</button>
</div>

<div id="top-bar">
    <div id="weather-pill" class="status-pill">🌡️ 로딩 중...</div>
    <div id="speed-pill" class="status-pill">⚡ 0.0 km/h</div>
</div>

<div id="map"></div>

<div id="panel">
    <div id="guideText">발걸음을 떼시면 네비게이션과<br>동네 이야기를 시작할게요!</div>
    <div class="bottom-btns">
        <button class="stop-btn" onclick="finishSession()">종료 및 결과 보기</button>
    </div>
</div>

<div id="summary-modal">
    <div class="summary-card">
        <h2 id="summary-title">오늘의 임장런 완료!</h2>
        <div class="summary-grid">
            <div class="summary-item"><span>운동 시간</span><strong id="res-time">00:00</strong></div>
            <div class="summary-item"><span>이동 거리</span><strong id="res-dist">0.0km</strong></div>
            <div class="summary-item"><span>평균 속도</span><strong id="res-speed">0.0km/h</strong></div>
            <div class="summary-item"><span>소모 칼로리</span><strong id="res-kcal">0kcal</strong></div>
        </div>
        <button class="start-btn" onclick="location.reload()">새로운 임장 시작</button>
    </div>
</div>

<script>
    const ELEVEN_API = "3febe1f6157a65575121c1a588dec4ef54dc0206f6bb555d266ca662a5b18c2e";
    const VOICE_ID = "7osWBIDUlEhEpEMcbqoW";
    const WEATHER_API_KEY = "YOUR_OPENWEATHER_API_KEY"; // 날씨 API 키 필요
    
    let map, runnerMarker, directionsService, directionsRenderer;
    let config = { mode: '산책', course: '언남동 324-1' };
    let startTime, watchId, lastPos;
    let totalDist = 0;
    let audioPlayer = new Audio();

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 17, center: { lat: 37.32, lng: 127.11 },
            disableDefaultUI: true,
            styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }]
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map, polylineOptions: { strokeColor: "#FF9500", strokeWeight: 6 }
        });
        runnerMarker = new google.maps.Marker({
            map: map, icon: { url: "https://cdn-icons-png.flaticon.com/512/616/616430.png", scaledSize: new google.maps.Size(40, 40) }
        });
    }

    function setMode(mode) {
        config.mode = mode;
        document.getElementById('btn-walk').classList.toggle('active', mode === '산책');
        document.getElementById('btn-run').classList.toggle('active', mode === '러닝');
        document.getElementById('walkCourse').style.display = mode === '산책' ? 'block' : 'none';
        document.getElementById('runCourse').style.display = mode === '러닝' ? 'block' : 'none';
        config.course = document.getElementById(mode === '산책' ? 'walkCourse' : 'runCourse').value;
    }

    async function startApp() {
        document.getElementById('overlay').style.display = 'none';
        startTime = new Date();
        
        navigator.geolocation.getCurrentPosition(pos => {
            const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            fetchWeather(myPos);
            drawRoute(myPos, config.course);
            startTracking();
        });
    }

    function drawRoute(start, end) {
        const mode = config.mode === '산책' ? 'WALKING' : 'BICYCLING'; // 러닝은 BICYCLING이 경로상 더 적합할 수 있음
        directionsService.route({
            origin: start, destination: end, travelMode: google.maps.TravelMode[mode]
        }, (res, status) => {
            if (status === 'OK') directionsRenderer.setDirections(res);
        });
    }

    function startTracking() {
        watchId = navigator.geolocation.watchPosition(pos => {
            const currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            runnerMarker.setPosition(currentPos);
            map.panTo(currentPos);

            // 속도 계산 (m/s -> km/h)
            const speed = (pos.coords.speed || 0) * 3.6;
            document.getElementById('speed-pill').innerText = `⚡ ${speed.toFixed(1)} km/h`;

            // 거리 누적
            if (lastPos) {
                const d = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(lastPos.lat, lastPos.lng),
                    new google.maps.LatLng(currentPos.lat, currentPos.lng)
                );
                totalDist += d;
            }
            lastPos = currentPos;
            
            // 지오펜싱 (임의의 포인트 60m 이내 감지 로직 추가 가능)
        }, null, { enableHighAccuracy: true });
    }

    async function fetchWeather(pos) {
        try {
            // 실제 API 사용 시: `https://api.openweathermap.org/data/2.5/weather?lat=${pos.lat}&lon=${pos.lng}&appid=${WEATHER_API_KEY}&units=metric`
            // 현재는 위치기반 가상 연동
            const temp = 22.5; // 예시 기온
            document.getElementById('weather-pill').innerText = `☀️ 구성동 ${temp}°C`;
        } catch(e) {}
    }

    async function speak(text) {
        // 음악 일시정지 효과 (Audio Ducking)
        // 브라우저에서 실행되는 타 앱(유튜브 등)을 직접 멈출 수는 없으나, 
        // 이 앱 내에서 재생되는 소리가 있다면 조절합니다.
        try {
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: "POST",
                headers: { "xi-api-key": ELEVEN_API, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
            });
            const blob = await res.blob();
            audioPlayer.src = URL.createObjectURL(blob);
            
            // 설명 시작 시 이벤트
            audioPlayer.onplay = () => { /* 외부 음악 앱 제어는 시스템 설정에 따름 */ };
            audioPlayer.play();
        } catch (e) {}
    }

    function finishSession() {
        navigator.geolocation.clearWatch(watchId);
        const endTime = new Date();
        const diffSec = Math.floor((endTime - startTime) / 1000);
        const min = Math.floor(diffSec / 60);
        const sec = diffSec % 60;
        
        const distKm = (totalDist / 1000).toFixed(2);
        const avgSpeed = (distKm / (diffSec / 3600)).toFixed(1);
        const kcal = (config.mode === '산책' ? distKm * 50 : distKm * 70).toFixed(0);

        document.getElementById('res-time').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
        document.getElementById('res-dist').innerText = `${distKm}km`;
        document.getElementById('res-speed').innerText = `${isNaN(avgSpeed) ? 0 : avgSpeed}km/h`;
        document.getElementById('res-kcal').innerText = `${kcal}kcal`;
        
        document.getElementById('summary-modal').style.display = 'flex';
        document.getElementById('summary-title').innerText = `${config.mode} 종료!`;
    }

    window.onload = initMap;
</script>
</body>
</html>
