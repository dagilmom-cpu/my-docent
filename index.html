<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>임장런 - Imjang Run</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBp1tTcQN6VvPFfQk2uMM6E0xrao1dgzTo&libraries=geometry"></script>
    <style>
        :root { --primary: #FF9500; --dark: #1C1C1E; --gray: #8E8E93; --light: #F2F2F7; }
        body { margin: 0; font-family: 'Pretendard', -apple-system, sans-serif; background: var(--light); overflow: hidden; color: var(--dark); }
        
        #overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .header-section { margin-bottom: 25px; }
        .header-section h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -1px; }
        .header-section p { color: var(--gray); margin-top: 5px; font-size: 0.95rem; }

        .setup-group { margin-bottom: 20px; }
        .setup-label { font-size: 0.85rem; font-weight: 700; color: var(--gray); margin-bottom: 10px; display: block; }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { background: var(--light); border: 2px solid transparent; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .option-card.active { border-color: var(--primary); background: #FFF5E5; color: var(--primary); font-weight: 700; }

        .dist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .dist-card { background: var(--light); border-radius: 12px; padding: 12px 0; text-align: center; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .dist-card.active { background: var(--primary); color: white; }

        .select-style { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; background-color: #fff; font-size: 0.95rem; outline: none; cursor: pointer; margin-bottom: 10px; }
        .start-btn { margin-top: 30px; width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }

        /* 메인 UI */
        #map { height: 100vh; width: 100%; }
        #weather-widget { position: absolute; top: 20px; right: 20px; background: white; padding: 10px 18px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; font-weight: 800; font-size: 0.9rem; border: 2px solid var(--primary); }
        #panel { position: absolute; bottom: 0; width: 100%; height: 160px; background: white; border-radius: 30px 30px 0 0; padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 100; box-sizing: border-box;}
        #guideTitle { font-size: 0.8rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        #guideText { font-size: 1rem; font-weight: 600; line-height: 1.5; color: var(--dark); }
        
        .map-controls { position: absolute; right: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 12px; z-index: 150; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="header-section">
        <h1>임장런 Imjang Run 🐾</h1>
        <p>함께 달릴 준비 되셨나요?</p>
    </div>

    <div class="setup-group">
        <span class="setup-label">1. 오늘 나의 템포</span>
        <div class="card-grid">
            <div id="btn-walk" class="option-card active" onclick="setMode('산책')">🚶 여유로운 산책</div>
            <div id="btn-run" class="option-card" onclick="setMode('러닝')">🏃 시원한 러닝</div>
        </div>
    </div>

    <div class="setup-group">
        <span class="setup-label">2. 목표 거리</span>
        <div class="dist-grid">
            <div class="dist-card active" onclick="setDist(this, 1)">1km</div>
            <div class="dist-card" onclick="setDist(this, 3)">3km</div>
            <div class="dist-card" onclick="setDist(this, 5)">5km</div>
            <div class="dist-card" onclick="setDist(this, 10)">10km</div>
        </div>
    </div>

    <div class="setup-group">
        <span class="setup-label">3. 어떤 코스로 가볼까요?</span>
        <select id="walkCourse" class="select-style" onchange="config.course = this.value">
            <option value="W1">🏡 구성동 노후 빌라촌 & 골목 탐방</option>
            <option value="W2">🌳 마북천 수변 공원 산책 코스</option>
            <option value="W3">☕ 구성사거리 상가 & 카페거리 코스</option>
        </select>
        <select id="runCourse" class="select-style" style="display:none;" onchange="config.course = this.value">
            <option value="R1">🏃 탄천 합수부 ~ 보정역 직선 러닝</option>
            <option value="R2">⛰️ 언남동 대단지 아파트 정복 코스</option>
            <option value="R3">🏗️ 플랫폼시티 부지 한바퀴 코스</option>
        </select>
    </div>

    <div class="setup-group">
        <span class="setup-label">4. 가이드 음성</span>
        <div class="card-grid">
            <div class="option-card active" onclick="setDocent(this, '듣기')">친절하게 듣기</div>
            <div class="option-card" onclick="setDocent(this, '조용히')">조용히 걷기</div>
        </div>
    </div>

    <button class="start-btn" onclick="startApp()">고양이와 함께 출발!</button>
</div>

<div id="weather-widget">☀️ 구성동 맑음 21°C</div>
<div id="map"></div>
<div class="map-controls">
    <button id="mapTypeBtn" class="control-btn" onclick="toggleMapType()">🛰️</button>
    <button class="control-btn" onclick="centerMap()">📍</button>
</div>
<div id="panel">
    <div id="guideTitle">START RUNNING</div>
    <div id="guideText">발걸음을 떼시면 제가 곁에서<br>동네 이야기를 들려드릴게요!</div>
</div>

<script>
    const ELEVEN_API = "3febe1f6157a65575121c1a588dec4ef54dc0206f6bb555d266ca662a5b18c2e";
    const VOICE_ID = "7osWBIDUlEhEpEMcbqoW";
    
    let map, runnerMarker;
    let points = [];
    let announced = new Set();
    let audioPlayer = new Audio();
    const myHome = { lat: 37.3200, lng: 127.1100 };
    let config = { mode: '산책', dist: 1, docent: '듣기', course: 'W1' };

    // 1. 드롭다운 전환 함수 (확실한 물리적 제어)
    function setMode(mode) {
        config.mode = mode;
        const wBtn = document.getElementById('btn-walk');
        const rBtn = document.getElementById('btn-run');
        const wSelect = document.getElementById('walkCourse');
        const rSelect = document.getElementById('runCourse');

        if(mode === '산책') {
            wBtn.classList.add('active'); rBtn.classList.remove('active');
            wSelect.style.display = 'block'; rSelect.style.display = 'none';
            config.course = wSelect.value;
        } else {
            rBtn.classList.add('active'); wBtn.classList.remove('active');
            rSelect.style.display = 'block'; wSelect.style.display = 'none';
            config.course = rSelect.value;
        }
    }

    function setDist(el, d) {
        document.querySelectorAll('.dist-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        config.dist = d;
    }

    function setDocent(el, type) {
        el.parentElement.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        config.docent = type;
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: myHome, zoom: 17, disableDefaultUI: true,
            styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }]
        });
        runnerMarker = new google.maps.Marker({
            position: myHome, map: map,
            icon: { url: "https://cdn-icons-png.flaticon.com/512/616/616430.png", scaledSize: new google.maps.Size(30, 30), anchor: new google.maps.Point(15, 15) }
        });
    }

    function toggleMapType() {
        const current = map.getMapTypeId();
        map.setMapTypeId(current === 'roadmap' ? 'hybrid' : 'roadmap');
        document.getElementById('mapTypeBtn').innerText = current === 'roadmap' ? '🗺️' : '🛰️';
    }

    async function startApp() {
        // [소리 해결] 사용자가 클릭한 직후 오디오 컨텍스트와 스피커 강제 활성화
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        audioPlayer.play().catch(() => {}); // 무음 트리거

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('overlay').style.display = 'none';
            map.setCenter(myPos);
            runnerMarker.setPosition(myPos);
            createLocalData(myPos); 
            startGPS();
            
            // 날씨 멘트 추가
            const startMsg = "현재 구성동은 맑고 선선한 21도입니다. 임장하기 완벽한 날씨네요! 도슨트를 시작합니다.";
            document.getElementById("guideText").innerText = startMsg;
            if(config.docent === '듣기') speak(startMsg);
        }, (err) => {
            document.getElementById('overlay').style.display = 'none';
            createLocalData(myHome);
            startGPS();
        }, { enableHighAccuracy: true });
    }

    function createLocalData(basePos) {
        points = [];
        const courseMap = {
            'W1': { spots: ["언남동 빌라촌", "구성동 노후주택가"], desc: "이곳 빌라들은 대지지분이 넓어 미래 가치가 높습니다." },
            'W2': { spots: ["마북천 산책로", "연원마을 수변로"], desc: "수변 공원이 잘 정비되어 주거 쾌적성이 최고인 지역입니다." },
            'W3': { spots: ["구성사거리 학원가", "근생 상가건물"], desc: "공실이 없는 튼튼한 상권입니다. 임대 수익을 눈여겨보세요." },
            'R1': { spots: ["탄천 직선코스", "보정역 탄천길"], desc: "플랫폼시티 부지가 한눈에 보이는 핵심 러닝 코스입니다." },
            'R2': { spots: ["벽산아파트 단지", "삼성래미안 언덕길"], desc: "GTX 구성역 호재를 품은 이 동네 대장 아파트들입니다." },
            'R3': { spots: ["플랫폼시티 공사현장", "구성역 2번출구"], desc: "용인의 미래, 플랫폼시티의 규모를 직접 느껴보세요." }
        };
        const current = courseMap[config.course] || courseMap['W1'];
        for (let i = 0; i < 30; i++) {
            const spotName = current.spots[i % current.spots.length];
            points.push({
                id: 'p'+i,
                lat: basePos.lat + (Math.random()-0.5)*0.012,
                lng: basePos.lng + (Math.random()-0.5)*0.012,
                text: `지금 ${spotName} 근처입니다. ${current.desc}`
            });
        }
    }

    function startGPS() {
        navigator.geolocation.watchPosition(pos => {
            const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            runnerMarker.setPosition(p);
            map.panTo(p);
            if(config.docent === '듣기') checkDistance(p);
        }, null, { enableHighAccuracy: true });
    }

    function checkDistance(p) {
        points.forEach(point => {
            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(p.lat, p.lng), new google.maps.LatLng(point.lat, point.lng)
            );
            if (dist < 60 && !announced.has(point.id)) {
                announced.add(point.id);
                document.getElementById("guideText").innerText = point.text;
                speak(point.text);
            }
        });
    }

    async function speak(text) {
        try {
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: "POST",
                headers: { "xi-api-key": ELEVEN_API, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2", voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
            });
            if (!res.ok) return;
            const blob = await res.blob();
            audioPlayer.src = URL.createObjectURL(blob);
            audioPlayer.play();
        } catch (e) { console.error("음성 오류:", e); }
    }

    function centerMap() {
        const pos = runnerMarker.getPosition();
        if (pos) map.panTo(pos);
    }
    window.onload = initMap;
</script>
</body>
</html>
