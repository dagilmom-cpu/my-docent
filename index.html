<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>임장런 Pro - 카카오 최종</title>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=fc0e1252de533a43104fe5566190be9c&libraries=services,clusterer,drawing&autoload=false"></script>

    <style>
        :root { --primary: #FF3B30; --dark: #1C1C1E; --gray: #8E8E93; --light: #F2F2F7; --orange: #FF9500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #overlay { position: fixed; inset: 0; background: white; z-index: 5000; padding: 30px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .header-section h1 { font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--primary); }
        .setup-group { margin-bottom: 18px; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-card { background: var(--light); border: 2px solid transparent; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; }
        .option-card.active { border-color: var(--primary); background: #FFF5F5; color: var(--primary); font-weight: 800; }
        .dist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .dist-card { background: var(--light); border-radius: 12px; padding: 10px 0; text-align: center; font-weight: 700; cursor: pointer; }
        .dist-card.active { background: var(--primary); color: white; }
        .select-style { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; background-color: #fff; font-size: 0.95rem; outline: none; }
        .start-btn { margin-top: 20px; width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 1.2rem; }
        
        /* 📍 지도 영역 (배경색을 넣어 로딩 여부 확인) */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f0f0; z-index: 10; }
        
        #navi-widget { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 75%; background: var(--orange); color: white; padding: 10px 15px; border-radius: 15px; z-index: 3000; display: none; align-items: center; gap: 10px; }
        #panel { position: absolute; bottom: 0; width: 100%; min-height: 220px; background: white; border-radius: 25px 25px 0 0; padding: 20px; z-index: 100; box-sizing: border-box; display: none; }
        .map-controls { position: absolute; right: 20px; bottom: 240px; display: flex; flex-direction: column; gap: 12px; z-index: 150; }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="margin-bottom: 25px;"><h1>임장런 with 두부 🐾</h1><p style="color:var(--gray);">구성로 90 기점 시뮬레이션</p></div>
    <div class="setup-group"><span style="font-size:0.85rem; font-weight:700; color:var(--gray);">1. 템포</span><div class="card-grid"><div id="btn-walk" class="option-card active" onclick="App.setMode('걷기')">🚶 걷기</div><div id="btn-run" class="option-card" onclick="App.setMode('러닝')">🏃 러닝</div></div></div>
    <div class="setup-group"><span style="font-size:0.85rem; font-weight:700; color:var(--gray);">2. 거리</span><div class="dist-grid"><div id="d1" class="dist-card active" onclick="App.setDist(this, 1)">1km</div><div id="d3" class="dist-card" onclick="App.setDist(this, 3)">3km</div><div id="d5" class="dist-card" onclick="App.setDist(this, 5)">5km</div><div id="d10" class="dist-card" onclick="App.setDist(this, 10)">10km</div></div></div>
    <div class="setup-group"><span style="font-size:0.85rem; font-weight:700; color:var(--gray);">3. 코스</span><select id="activeCourse" class="select-style" onchange="App.updateCourse(this.value)"></select></div>
    <button class="start-btn" onclick="App.start()">분석 시작! 🚀</button>
</div>

<div id="map"></div>

<div id="navi-widget"><div style="font-size:1.5rem;">↑</div><div style="flex:1"><div style="font-size:1rem; font-weight:800;"><span id="navi-m">450</span>m</div><div style="font-size:0.65rem;">보정역 방면 시뮬레이션 중</div></div></div>

<div class="map-controls">
    <button class="control-btn" onclick="MapModule.toggleMapType()">🛰️</button>
    <button class="control-btn" onclick="MapModule.centerMap()">📍</button>
</div>

<div id="panel">
    <div id="guideTitle" style="font-size:0.8rem; font-weight:800; color:var(--primary);">DUBU DEEP INSIGHT</div>
    <div id="guideText" style="font-size:0.95rem; font-weight:600; line-height:1.6; height:5.5em; overflow-y:auto;">데이터 수집 중...</div>
    <button class="start-btn" style="padding:12px; font-size:14px; background:var(--dark);" onclick="location.reload()">다시 시작</button>
</div>

<script>
const ELEVENLABS_API_KEY = "3febe1f6157a65575121c1a588dec4ef54dc0206f6bb555d266ca662a5b18c2e";
const VOICE_ID = "7osWBIDUlEpEpEMcbqoW";
const FIXED_START = { lat: 37.31845, lng: 127.11052 };

const InfoModule = {
    audio: new Audio(),
    scripts: [
        "안녕하세요, 부동산 도슨트 두부입니다. 지금부터 구성로 90, '구성역 래미안 2차' 단지를 기점으로 보정역 방면 분석 시뮬레이션을 시작하겠습니다.",
        "현재 단지 앞 마북천 정비 사업 구간은 입주민들의 삶의 질을 높이는 핵심 프리미엄 인프라입니다.",
        "구성로 상업시설은 전형적인 항아리 상권으로, 플랫폼시티 완공 시 대규모 인구 유입의 낙수 효과를 누릴 지역입니다.",
        "보정역 기점에 도달했습니다. 래미안 2차는 미래 도시 계획의 가장 앞자리에 위치해 있습니다. 오늘의 임장 분석을 마칩니다."
    ],
    async speak(text) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') await ctx.resume();
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: "POST",
                headers: { "xi-api-key": ELEVENLABS_API_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ text, model_id: "eleven_multilingual_v2" })
            });
            const blob = await res.blob();
            this.audio.src = URL.createObjectURL(blob);
            this.audio.play();
        } catch(e) {}
    }
};

const CourseData = {
    '걷기': { 1: { name: "🏡 [걷기] 래미안 2차 → 보정역 분석", end: {lat: 37.3121, lng: 127.1082} } },
    '러닝': { 1: { name: "⚡ [러닝] GTX 용인역 수혜권 스캔", end: {lat: 37.3110, lng: 127.1052} } }
};

const MapModule = {
    map: null, marker: null,
    init() {
        // 🛡️ 카카오 엔진이 완전히 로드된 후 지도를 그림
        kakao.maps.load(() => {
            const container = document.getElementById('map');
            const pos = new kakao.maps.LatLng(FIXED_START.lat, FIXED_START.lng);
            this.map = new kakao.maps.Map(container, { center: pos, level: 3 });
            this.marker = new kakao.maps.Marker({ position: pos });
            this.marker.setMap(this.map);
        });
    },
    toggleMapType() {
        if(!this.map) return;
        const type = this.map.getMapTypeId();
        this.map.setMapTypeId(type === kakao.maps.MapTypeId.ROADMAP ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);
    },
    centerMap() { 
        if(!this.map) return;
        this.map.panTo(new kakao.maps.LatLng(FIXED_START.lat, FIXED_START.lng)); 
    }
};

const App = {
    config: { mode: '걷기', dist: 1 },
    init() { MapModule.init(); this.renderOptions(); },
    renderOptions() {
        const sel = document.getElementById('activeCourse'); sel.innerHTML = "";
        Object.entries(CourseData[this.config.mode]).forEach(([d, o]) => {
            const opt = document.createElement('option'); opt.value = d; opt.innerText = o.name;
            sel.appendChild(opt);
        });
        this.updateCourse(sel.value);
    },
    setMode(m) { this.config.mode = m; this.renderOptions(); document.getElementById('btn-walk').className = m === '걷기' ? 'option-card active' : 'option-card'; document.getElementById('btn-run').className = m === '러닝' ? 'option-card active' : 'option-card'; },
    setDist(el, d) { document.querySelectorAll('.dist-card').forEach(c => c.classList.remove('active')); el.classList.add('active'); this.config.dist = d; this.renderOptions(); },
    updateCourse(k) { this.config.course = CourseData[this.config.mode][k]; },
    async start() {
        InfoModule.audio.play().catch(() => {});
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('navi-widget').style.display = 'flex';
        document.getElementById('panel').style.display = 'block';
        
        let i = 0; let step = 0;
        const moveInterval = setInterval(() => {
            if (i > 20) { clearInterval(moveInterval); return; }
            const nextLat = FIXED_START.lat - (i * 0.0003);
            const nextLng = FIXED_START.lng - (i * 0.0001);
            const nextPos = new kakao.maps.LatLng(nextLat, nextLng);
            
            if(MapModule.marker) MapModule.marker.setPosition(nextPos);
            if(MapModule.map) MapModule.map.panTo(nextPos);
            
            document.getElementById('navi-m').innerText = Math.max(0, 450 - (i * 20));
            if (i % 5 === 0 && step < 4) {
                const text = InfoModule.scripts[step++];
                document.getElementById('guideText').innerHTML = `<b>부동산 도슨트 두부</b><br>${text}`;
                InfoModule.speak(text);
            }
            i++;
        }, 3000);
    }
};
window.onload = () => App.init();
</script>
</body>
</html>
