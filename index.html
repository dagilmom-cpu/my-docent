<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>임장런 Pro - 두부와 함께</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA4CJuddR6QNbyf2kMt0GF8XogwanaFz9Q&libraries=geometry,places"></script>
    <style>
        :root { --primary: #FF9500; --dark: #1C1C1E; --gray: #8E8E93; --light: #F2F2F7; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--light); overflow: hidden; }
        
        #overlay { position: fixed; inset: 0; background: white; z-index: 2000; padding: 40px 25px; display: flex; flex-direction: column; }
        .start-btn { margin-top: auto; width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }

        #map { height: 100vh; width: 100%; background: #eee; } /* 지도가 안 나올 때 회색으로 표시 */
        #speed-widget { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 15px; z-index: 1000; font-size: 0.8rem; }
        
        #panel { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        #guideText { font-size: 0.95rem; font-weight: 600; line-height: 1.5; color: var(--dark); min-height: 50px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--primary)">임장런 with 두부 🐾</h1>
    <p>지도가 나오지 않는다면 아래를 확인해 주세요:<br>
       1. 구글 콘솔에서 <b>Maps SDK for JS</b> 활성화<br>
       2. 구글 콘솔에서 <b>결제 계정</b> 연결</p>
    <button class="start-btn" onclick="startApp()">두부와 임장 시작하기</button>
</div>

<div id="speed-widget">⚡ 속도: <span id="current-speed">0.0</span> km/h</div>
<div id="map"></div>
<div id="panel">
    <div id="guideText">두부가 지도를 불러오는 중입니다...</div>
</div>

<script>
    let map, runnerMarker, directionsService, directionsRenderer;
    let totalDistance = 0, lastPos = null;
    let audioPlayer = new Audio();
    
    // 지도가 로드되지 않았을 때 에러 메시지를 화면에 뿌려주는 함수
    window.gm_authFailure = function() {
        const msg = "구글 맵 인증 실패! (결제 수단이나 API 활성화를 확인해주세요)";
        document.getElementById('guideText').innerText = msg;
        alert(msg);
    };

    function initMap() {
        try {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 37.318, lng: 127.110 }, 
                zoom: 16,
                disableDefaultUI: false // 테스트를 위해 UI를 잠시 켭니다
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
            
            runnerMarker = new google.maps.Marker({
                map: map,
                position: { lat: 37.318, lng: 127.110 },
                icon: { url: "https://cdn-icons-png.flaticon.com/512/616/616430.png", scaledSize: new google.maps.Size(40, 40) }
            });
            document.getElementById('guideText').innerText = "지도가 성공적으로 로드되었습니다! 🐾";
        } catch (e) {
            document.getElementById('guideText').innerText = "에러 발생: " + e.message;
        }
    }

    function startApp() {
        document.getElementById('overlay').style.display = 'none';
        navigator.geolocation.getCurrentPosition(pos => {
            const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(myPos);
            runnerMarker.setPosition(myPos);
            document.getElementById('guideText').innerText = "임장을 시작합니다. 두부를 따라오세요!";
        }, err => {
            document.getElementById('guideText').innerText = "GPS를 켜주셔야 내 위치가 지도에 나옵니다.";
        });
    }

    window.onload = initMap;
</script>
</body>
</html>
