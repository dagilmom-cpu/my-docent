<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Running Docent</title>
    <style>
        :root { --primary: #007AFF; --dark: #1C1C1E; --bg: #F2F2F7; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--dark); overflow: hidden; }
        
        /* 1. 설정 화면 */
        #setup-screen { position: fixed; inset: 0; background: white; z-index: 1000; padding: 30px; overflow-y: auto; }
        .setup-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 30px; }
        .option-group { margin-bottom: 25px; }
        .option-label { display: block; font-weight: 700; margin-bottom: 12px; color: #8E8E93; font-size: 0.9rem; }
        .btn-toggle { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-toggle button { flex: 1; min-width: 80px; padding: 12px; border: 1.5px solid #E5E5EA; border-radius: 12px; background: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-toggle button.active { background: var(--primary); color: white; border-color: var(--primary); }
        #start-service-btn { width: 100%; padding: 20px; background: var(--dark); color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 1.1rem; margin-top: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* 2. 메인 화면 */
        #main-screen { display: none; height: 100vh; flex-direction: column; }
        #header { background: var(--dark); color: white; padding: 18px; text-align: center; font-weight: 800; }
        #map { flex: 1; width: 100%; position: relative; }
        #info-panel { height: 35vh; padding: 25px; background: white; border-top-left-radius: 24px; border-top-right-radius: 24px; position: relative; top: -25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        .announcement { background: #F8F9FB; padding: 18px; border-radius: 16px; border-left: 4px solid var(--primary); height: 100px; overflow-y: auto; }
        .map-overlay-btn { position: absolute; right: 20px; bottom: 38vh; width: 52px; height: 52px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; border: none; font-size: 24px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-title">운동 및 안내 설정</div>
    
    <div class="option-group">
        <span class="option-label">운동 유형</span>
        <div class="btn-toggle" id="mode-select">
            <button class="active" onclick="selectOpt(this, 'mode')">산책 🚶</button>
            <button onclick="selectOpt(this, 'mode')">러닝 🏃</button>
        </div>
    </div>

    <div class="option-group">
        <span class="option-label">목표 거리</span>
        <div class="btn-toggle" id="dist-select">
            <button class="active" onclick="selectOpt(this, 'dist')">1km</button>
            <button onclick="selectOpt(this, 'dist')">3km</button>
            <button onclick="selectOpt(this, 'dist')">5km</button>
            <button onclick="selectOpt(this, 'dist')">10km</button>
        </div>
    </div>

    <div class="option-group">
        <span class="option-label">추천 코스 선택</span>
        <div class="btn-toggle" id="course-select">
            <button class="active" onclick="selectOpt(this, 'course')">구성사거리 코스</button>
            <button onclick="selectOpt(this, 'course')">언남동 공원 코스</button>
        </div>
    </div>

    <div class="option-group">
        <span class="option-label">부동산 도슨트 사용 여부</span>
        <div class="btn-toggle" id="docent-select">
            <button class="active" onclick="selectOpt(this, 'docent')">사용</button>
            <button onclick="selectOpt(this, 'docent')">미사용</button>
        </div>
    </div>

    <button id="start-service-btn" onclick="startApp()">서비스 시작하기</button>
</div>

<div id="main-screen">
    <div id="header">REAL ESTATE RUNNING</div>
    <div id="map"></div>
    <button class="map-overlay-btn" onclick="goToMyLocation()">🏃</button>
    <div id="info-panel">
        <div class="announcement">
            <div id="guide-text" style="font-size: 1.05rem; line-height: 1.6; font-weight: 500;">안내를 시작하려면 버튼을 눌러주세요.</div>
        </div>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBp1tTcQN6VvPFfQk2uMM6E0xrao1dgzTo&libraries=geometry&callback=initMap" async defer></script>

<script>
    let map, runnerMarker;
    const EL_API_KEY = "6de3761d943fe084486efb94676a26daab9fc28640b57951"; 
    const VOICE_ID = "O7njSdfuJRf0H4s0EQeo";
    let announcedIds = new Set();
    let config = { mode: '산책 🚶', dist: '1km', course: '구성사거리 코스', docent: '사용' };

    // 샘플 경로 (도로 기반 좌표)
    const paths = {
        '구성사거리 코스': [
            {lat: 37.2885, lng: 127.1135}, {lat: 37.2895, lng: 127.1145},
            {lat: 37.2905, lng: 127.1155}, {lat: 37.2915, lng: 127.1165},
            {lat: 37.2925, lng: 127.1175}, {lat: 37.2935, lng: 127.1185}
        ],
        '언남동 공원 코스': [
            {lat: 37.2910, lng: 127.1160}, {lat: 37.2920, lng: 127.1170},
            {lat: 37.2930, lng: 127.1180}, {lat: 37.2940, lng: 127.1190}
        ]
    };

    const propertyData = [
        { id: 1, lat: 37.2895, lng: 127.1145, info: "언남동 구역입니다. 최근 단독주택 실거래가는 약 12억 원대를 형성하고 있습니다." },
        { id: 2, lat: 37.2930, lng: 127.1180, info: "구성사거리 인근입니다. 최근 상가 수익률은 4%대로 안정적인 흐름을 보이고 있습니다." }
    ];

    function selectOpt(btn, type) {
        btn.parentNode.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        config[type] = btn.innerText;
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: paths['구성사거리 코스'][0], zoom: 17, disableDefaultUI: true
        });
        runnerMarker = new google.maps.Marker({
            position: paths['구성사거리 코스'][0], map: map,
            icon: { url: "https://cdn-icons-png.flaticon.com/512/571/571212.png", scaledSize: new google.maps.Size(40, 40) }
        });
    }

    async function startApp() {
        // [소리 해결 핵심] 버튼 클릭 시 AudioContext 활성화
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'flex';
        
        const startMsg = `${config.course}에서 ${config.dist} ${config.mode}을 시작합니다.`;
        document.getElementById('guide-text').innerText = startMsg;
        
        // 일레븐랩스 첫 재생 시도 (잠금 해제)
        await playElevenLabs(startMsg);
        runSimulation();
    }

    function runSimulation() {
        let step = 0;
        const currentPath = paths[config.course] || paths['구성사거리 코스'];
        const intervalTime = config.mode.includes('러닝') ? 2000 : 3500; // 러닝이 더 빠름

        const interval = setInterval(() => {
            if (step >= currentPath.length) {
                clearInterval(interval);
                playElevenLabs("목표 거리에 도달했습니다. 운동을 마칩니다.");
                return;
            }
            const pos = currentPath[step];
            runnerMarker.setPosition(pos);
            map.panTo(pos);
            if (config.docent === '사용') checkProximity(pos);
            step++;
        }, intervalTime);
    }

    function checkProximity(pos) {
        propertyData.forEach(prop => {
            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(pos.lat, pos.lng), new google.maps.LatLng(prop.lat, prop.lng)
            );
            if (dist < 70 && !announcedIds.has(prop.id)) {
                announcedIds.add(prop.id);
                document.getElementById('guide-text').innerText = prop.info;
                playElevenLabs(prop.info);
            }
        });
    }

    async function playElevenLabs(text) {
        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "xi-api-key": EL_API_KEY },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
            });
            const blob = await response.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            await audio.play();
        } catch (e) { console.error("ElevenLabs Error:", e); }
    }

    function goToMyLocation() { map.panTo(runnerMarker.getPosition()); }
</script>
</body>
</html>
